name: SummerSMPCore
version: 1.3.0
main: net.summersmp.core.SummerSMPCore
api-version: '26.1.2'
author: SummerSMP
description: Mace cap, no crystals, big ender chests, combat tag, lifesteal-friendly utilities (/rtp, /tpa, /spawn, /world, /rule) and a staff ban command.

commands:
  ban:
    description: Temp-ban a player (staff / anti-cheat only).
    usage: /ban <player> <duration> [reason]
    permission: summersmp.ban
  unban:
    description: Unban a player.
    usage: /unban <player>
    permission: summersmp.unban
  maces:
    description: View or adjust the Mace counter.
    usage: /maces <view|set|setlimit|reload>
    permission: summersmp.maces
  rtp:
    description: Randomly teleport into the world.
    usage: /rtp
    permission: summersmp.rtp
  spawn:
    description: Teleport to the hub spawn.
    usage: /spawn
    permission: summersmp.spawn
  world:
    description: Teleport to 0,0 in the survival world.
    usage: /world
    permission: summersmp.world
  rule:
    description: Show the server rules.
    usage: /rule
    permission: summersmp.rule
  tpa:
    description: Ask to teleport to a player.
    usage: /tpa <player>
    permission: summersmp.tpa
  tpahere:
    description: Ask a player to teleport to you.
    usage: /tpahere <player>
    permission: summersmp.tpa
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept
    permission: summersmp.tpa
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny
    permission: summersmp.tpa

permissions:
  summersmp.ban:
    description: Allows temp-banning players.
    default: op
  summersmp.unban:
    description: Allows unbanning players.
    default: op
  summersmp.maces:
    description: Allows managing the Mace counter.
    default: op
  summersmp.rtp:
    description: Allows using /rtp.
    default: true
  summersmp.rtp.nocooldown:
    description: Bypass the /rtp warmup cooldown.
    default: op
  summersmp.spawn:
    description: Allows using /spawn.
    default: true
  summersmp.world:
    description: Allows using /world.
    default: true
  summersmp.rule:
    description: Allows using /rule.
    default: true
  summersmp.tpa:
    description: Allows using the teleport-request commands.
    default: true
